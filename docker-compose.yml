services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-wika}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    restart: unless-stopped
    ports:
      - "${API_PORT:-3002}:3002"
    environment:
      NODE_ENV: production
      APP_ENV: production
      APP_NAME: ${APP_NAME:-artisancode-backend-ts}
      APP_VERSION: ${APP_VERSION:-1.0.0}
      REST_PORT: 3002
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-wika}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS:-true}
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      DOKU_CLIENT_ID: ${DOKU_CLIENT_ID:-}
      DOKU_SHARED_KEY: ${DOKU_SHARED_KEY:-}
      API_BASE_URL: ${API_BASE_URL:-}
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      BUN_PUBLIC_API_URL: ${BUN_PUBLIC_API_URL:-http://localhost:3002}
    depends_on:
      - api

volumes:
  postgres_data:
